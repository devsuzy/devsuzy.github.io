
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACE HardWare</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="../common/css/common.css">
    <link rel="stylesheet" href="../lib/css/reset.css">
    <link rel="stylesheet" href="../lib/css/swiper.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="header-inner">
                <div class="logo">
                    <a href="#"><img src="/common/img/logo.png" alt=""></a>
                </div>
                <div class="direct-tel">
                    <a href="#"><img src="/common/img/tel_btn.png" alt=""></a>
                </div>
                <div class="menu-btn">
                    <a href="#"><img src="/common/img/ham.png" alt=""></a>
                </div>
                <div class="tel-text">
                    <img src="img/call_txt.png" alt="">
                </div>
            </div>
        </header>
        <div class="menu-wrapper">
            <div class="menu-close">
                <img src="/common/img/dim.png" alt="">
            </div>
            <div class="menu">
                <div class="menu-bg">
                    <img src="/common/img/gnb_bg.png" alt="">
                </div>
                <ul class="menu-list">
                    <li class="menu-home"></li>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>
        </div>
        <section>
            <div class="main-contents">
                <img src="img/bg.jpg" alt="">
                <div class="main-title">
                    <img src="img/1. 전.png" class="title" alt="">
                    <img src="img/2. 화.png" class="title" alt="">
                    <img src="img/3. 주.png" class="title" alt="">
                    <img src="img/4. 문.png" class="title" alt="">
                    <img src="img/5. 서.png" class="title" alt="">
                    <img src="img/6. 비.png" class="title" alt="">
                    <img src="img/7. 스.png" class="title" alt="">
                </div>
                <div class="call-btn">
                    <img src="img/call_btn.png" alt="">
                </div>
                <div class="scroll-btn">
                    <img src="img/scroll1.png" alt="">
                    <img src="img/scroll2.png" alt="">
                    <img src="img/scroll3.png" alt="">
                </div>
                <div class="menu-box">
                    <div class="show-btn btn1" data-alt="1"></div>
                    <div class="show-btn btn2" data-alt="5"></div>
                    <div class="show-btn btn3" data-alt="2"></div>
                    <div class="show-btn btn4" data-alt="3"></div>
                    <div class="show-btn btn5" data-alt="4"></div>
                </div>
            </div>
        </section>

    </div>
    

    <script src="../lib/js/jquery-3.3.1.min.js"></script>
    <script src="../lib/js/swiper.min.js"></script>
    <script src="../lib/js/TweenMax.min.js"></script>
    <script src="../common/js/common.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
